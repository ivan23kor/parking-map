<!DOCTYPE html>
<html>
<head>
    <title>Depth Data Debug</title>
</head>
<body>
    <h1>Depth Data Debug</h1>
    <pre id="output">Loading...</pre>
    <script>
        // Try to get data from the parent window if opened as popup
        if (window.opener && window.opener.currentDepthData) {
            document.getElementById('output').textContent = JSON.stringify(window.opener.currentDepthData, null, 2);
        } else {
            document.getElementById('output').textContent = 'No depth data available. This page must be opened from the main app.';
        }
    </script>
</body>
</html>
