<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tile Crop vs Static API — Side by Side</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #eee; font-family: monospace; font-size: 13px; }
  #controls { padding: 12px; background: #1a1a2e; border-bottom: 1px solid #333; }
  #controls label { margin-right: 8px; }
  #controls input, #controls select { background: #222; color: #eee; border: 1px solid #444; padding: 4px 8px; border-radius: 3px; }
  #controls button { background: #2563eb; color: #fff; border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; margin-left: 8px; }
  #controls button:disabled { opacity: 0.4; cursor: default; }
  #status { padding: 8px 12px; color: #fbbf24; font-size: 12px; }
  #grid { display: flex; flex-wrap: wrap; gap: 12px; padding: 12px; }
  .comparison { background: #1e1e1e; border: 1px solid #333; border-radius: 6px; overflow: hidden; width: 100%; max-width: 900px; }
  .comparison-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #252540; border-bottom: 1px solid #333; }
  .comparison-header .det-info { color: #9ca3af; font-size: 11px; }
  .comparison-body { display: flex; gap: 0; }
  .comparison-body .panel { flex: 1; text-align: center; padding: 8px; min-width: 0; }
  .comparison-body .panel img { max-width: 100%; max-height: 400px; border: 1px solid #333; display: block; margin: 0 auto; }
  .panel-label { font-size: 11px; color: #9ca3af; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .panel-meta { font-size: 10px; color: #666; margin-top: 4px; }
  .error { color: #f87171; padding: 20px; }
</style>
</head>
<body>

<div id="controls">
  <label>Pano ID: <input id="panoId" size="40" placeholder="paste panoId here"></label>
  <label>API Key: <input id="apiKey" size="40" placeholder="from parent window or config"></label>
  <label>Backend: <input id="apiUrl" value="/api" size="25"></label>
  <button id="fetchBtn" onclick="runComparison()">Fetch Detections + Compare</button>
  <button id="manualBtn" onclick="runManual()">Manual Det (paste JSON)</button>
</div>
<div id="status">Waiting for input...</div>
<div id="grid"></div>

<script>
// Grab config from parent window if opened from main app
try {
  if (opener) {
    const cfg = opener.GOOGLE_CONFIG;
    const detCfg = opener.DETECTION_CONFIG;
    if (cfg?.API_KEY) document.getElementById('apiKey').value = cfg.API_KEY;
    if (detCfg?.API_URL) document.getElementById('apiUrl').value = detCfg.API_URL;
    // Grab current pano
    const pano = opener.detectionPanorama?.getPano?.();
    if (pano) document.getElementById('panoId').value = pano;
    // Grab detections from parent
    const dets = opener.currentDetections;
    if (dets?.length) {
      window._parentDetections = dets;
      window._parentPanoId = pano;
      document.getElementById('status').textContent = `Found ${dets.length} detection(s) from parent. Pano: ${pano}`;
    }
  }
} catch(e) { /* cross-origin */ }

function setStatus(msg) { document.getElementById('status').textContent = msg; }

async function getSessionToken(panoId, apiKey) {
  // Get a new session token
  const resp = await fetch(`https://tile.googleapis.com/v1/streetview/sessions?panoId=${panoId}&key=${apiKey}`, {
    method: 'POST',
    body: JSON.stringify({ mapName: '' }),
  });
  if (!resp.ok) throw new Error(`Session token failed: ${resp.status}`);
  return (await resp.json()).session;
}

async function fetchMetadata(panoId, apiKey) {
  const resp = await fetch(`https://tile.googleapis.com/v1/streetview/metadata?panoId=${panoId}&key=${apiKey}`);
  if (!resp.ok) throw new Error(`Metadata failed: ${resp.status}`);
  return resp.json();
}

// Tile-crop approach (current pipeline)
async function fetchTileCrop(det, panoId, apiKey, apiUrl) {
  const session = await getSessionToken(panoId, apiKey);
  const metadata = await fetchMetadata(panoId, apiKey);

  const TILE_SIZE = 512;
  const GRID_W = 32 * TILE_SIZE; // 16384
  const GRID_H = 16 * TILE_SIZE; // 8192
  const panoHeading = metadata.heading || 0;
  const tilt = metadata.tilt ?? 90;

  // Convert heading/pitch to tile pixels (simplified, no tilt correction)
  const px = ((det.heading + 180 - panoHeading + 360) % 360) / 360 * GRID_W;
  const py = (90 - det.pitch) / 180 * GRID_H;

  // Angular size to pixels
  const signW = det.angular_width / 360 * GRID_W;
  const signH = det.angular_height / 180 * GRID_H;

  // Crop with padding
  const padX = 1.2, padY = 1.5;
  const cropW = signW * padX;
  const cropH = signH * padY;
  const cropX = Math.round(px - cropW / 2);
  const cropY = Math.round(py - cropH / 2);

  // Determine which tiles we need
  const margin = 1;
  const tileX1 = Math.floor(cropX / TILE_SIZE) - margin;
  const tileY1 = Math.floor(cropY / TILE_SIZE) - margin;
  const tileX2 = Math.ceil((cropX + cropW) / TILE_SIZE) + margin;
  const tileY2 = Math.ceil((cropY + cropH) / TILE_SIZE) + margin;

  const tiles = [];
  for (let ty = tileY1; ty <= tileY2; ty++) {
    for (let tx = tileX1; tx <= tileX2; tx++) {
      tiles.push({ x: ((tx % 32) + 32) % 32, y: Math.max(0, Math.min(15, ty)) });
    }
  }

  const body = {
    pano_id: panoId,
    tiles,
    tile_x1: tileX1,
    tile_y1: tileY1,
    crop_x: cropX - tileX1 * TILE_SIZE,
    crop_y: cropY - tileY1 * TILE_SIZE,
    crop_width: Math.round(cropW),
    crop_height: Math.round(cropH),
    confidence: det.confidence,
    api_key: apiKey,
    session_token: session,
    save: false,
    include_image: true,
  };

  const resp = await fetch(`${apiUrl}/crop-sign-tiles`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!resp.ok) throw new Error(`crop-sign-tiles: ${resp.status} ${await resp.text()}`);
  const result = await resp.json();
  return {
    src: result.image_base64 ? `data:image/jpeg;base64,${result.image_base64}` : null,
    width: result.width,
    height: result.height,
    tilesFetched: result.tiles_fetched,
    fov: 'full pano crop',
  };
}

// Static API approach (tight FOV centered on sign)
async function fetchStaticApi(det, panoId, apiKey, apiUrl) {
  const body = {
    pano_id: panoId,
    heading: det.heading,
    pitch: det.pitch,
    angular_width: det.angular_width,
    angular_height: det.angular_height,
    confidence: det.confidence,
    api_key: apiKey,
    padding: 1.5,
    vertical_padding: 3.0,
    width: 640,
    height: 640,
    // Use full image — no aggressive post-crop
    crop_width_ratio: 1.0,
    crop_height_ratio: 1.0,
    save: false,
    include_image: true,
  };

  const resp = await fetch(`${apiUrl}/preview-sign`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!resp.ok) throw new Error(`preview-sign: ${resp.status} ${await resp.text()}`);
  const result = await resp.json();
  return {
    src: result.image_base64 ? `data:image/jpeg;base64,${result.image_base64}` : null,
    width: result.width,
    height: result.height,
    fov: result.fov,
  };
}

// Run detection on a pano, then compare both approaches
async function runComparison() {
  const panoId = document.getElementById('panoId').value.trim();
  const apiKey = document.getElementById('apiKey').value.trim();
  const apiUrl = document.getElementById('apiUrl').value.trim();
  if (!panoId || !apiKey) { setStatus('Need panoId and API key'); return; }

  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  setStatus('Detecting...');

  try {
    // Run detection on full pano
    const session = await getSessionToken(panoId, apiKey);
    const metadata = await fetchMetadata(panoId, apiKey);
    const panoHeading = metadata.heading || 0;

    // Fetch center tiles for detection (4x2 grid centered on heading)
    const centerTileX = Math.round((panoHeading / 360 * 32 + 16) % 32);
    const tiles = [];
    for (let dy = 6; dy <= 9; dy++) {
      for (let dx = -1; dx <= 2; dx++) {
        tiles.push({ x: ((centerTileX + dx) % 32 + 32) % 32, y: dy });
      }
    }

    setStatus('Running YOLO detection...');
    const detResp = await fetch(`${apiUrl}/detect-tiles`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        pano_id: panoId,
        tiles,
        tile_x1: centerTileX - 1,
        tile_y1: 6,
        api_key: apiKey,
        session_token: session,
        pano_heading: panoHeading,
      }),
    });

    if (!detResp.ok) throw new Error(`detect-tiles: ${detResp.status}`);
    const detResult = await detResp.json();
    const detections = detResult.detections || [];

    if (!detections.length) {
      setStatus('No detections found');
      btn.disabled = false;
      return;
    }

    setStatus(`Found ${detections.length} detection(s). Comparing...`);
    await renderComparisons(detections, panoId, apiKey, apiUrl);
  } catch(e) {
    setStatus(`Error: ${e.message}`);
    console.error(e);
  }
  btn.disabled = false;
}

// Use detections already available from parent window
async function runManual() {
  const panoId = document.getElementById('panoId').value.trim() || window._parentPanoId;
  const apiKey = document.getElementById('apiKey').value.trim();
  const apiUrl = document.getElementById('apiUrl').value.trim();
  const dets = window._parentDetections;

  if (!dets?.length) {
    const json = prompt('Paste detection JSON array:');
    if (!json) return;
    try {
      window._parentDetections = JSON.parse(json);
    } catch(e) { setStatus('Invalid JSON'); return; }
    return runManual();
  }

  if (!panoId || !apiKey) { setStatus('Need panoId and API key'); return; }

  const btn = document.getElementById('manualBtn');
  btn.disabled = true;
  setStatus(`Comparing ${dets.length} detection(s)...`);
  try {
    await renderComparisons(dets, panoId, apiKey, apiUrl);
  } catch(e) {
    setStatus(`Error: ${e.message}`);
    console.error(e);
  }
  btn.disabled = false;
}

async function renderComparisons(detections, panoId, apiKey, apiUrl) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  for (let i = 0; i < detections.length; i++) {
    const det = detections[i];
    const card = document.createElement('div');
    card.className = 'comparison';

    // Header
    const header = document.createElement('div');
    header.className = 'comparison-header';
    header.innerHTML = `
      <span>Detection #${i + 1} — conf ${det.confidence.toFixed(2)}</span>
      <span class="det-info">h=${det.heading?.toFixed(1)}° p=${det.pitch?.toFixed(1)}° aw=${det.angular_width?.toFixed(2)}° ah=${det.angular_height?.toFixed(2)}°</span>
    `;
    card.appendChild(header);

    // Body with two panels
    const body = document.createElement('div');
    body.className = 'comparison-body';

    // Panel: tile crop
    const tilePanel = document.createElement('div');
    tilePanel.className = 'panel';
    tilePanel.innerHTML = `<div class="panel-label">Tile Crop (zoom 5)</div><div class="panel-meta">Loading...</div>`;
    body.appendChild(tilePanel);

    // Panel: static API
    const staticPanel = document.createElement('div');
    staticPanel.className = 'panel';
    staticPanel.innerHTML = `<div class="panel-label">Static API (tight FOV)</div><div class="panel-meta">Loading...</div>`;
    body.appendChild(staticPanel);

    card.appendChild(body);
    grid.appendChild(card);

    // Fetch both in parallel
    const [tileResult, staticResult] = await Promise.allSettled([
      fetchTileCrop(det, panoId, apiKey, apiUrl),
      fetchStaticApi(det, panoId, apiKey, apiUrl),
    ]);

    // Render tile crop result
    if (tileResult.status === 'fulfilled' && tileResult.value.src) {
      tilePanel.innerHTML = `
        <div class="panel-label">Tile Crop (zoom 5)</div>
        <img src="${tileResult.value.src}" alt="Tile crop">
        <div class="panel-meta">${tileResult.value.width}x${tileResult.height}px | ${tileResult.value.tilesFetched} tiles</div>
      `;
    } else {
      tilePanel.innerHTML = `
        <div class="panel-label">Tile Crop (zoom 5)</div>
        <div class="error">${tileResult.status === 'rejected' ? tileResult.reason.message : 'No image returned'}</div>
      `;
    }

    // Render static API result
    if (staticResult.status === 'fulfilled' && staticResult.value.src) {
      staticPanel.innerHTML = `
        <div class="panel-label">Static API (fov=${staticResult.value.fov?.toFixed(1)}°)</div>
        <img src="${staticResult.value.src}" alt="Static API">
        <div class="panel-meta">${staticResult.value.width}x${staticResult.value.height}px | fov=${staticResult.value.fov?.toFixed(1)}°</div>
      `;
    } else {
      staticPanel.innerHTML = `
        <div class="panel-label">Static API (tight FOV)</div>
        <div class="error">${staticResult.status === 'rejected' ? staticResult.reason.message : 'No image returned'}</div>
      `;
    }

    setStatus(`Compared ${i + 1}/${detections.length}`);
  }
  setStatus(`Done. ${detections.length} comparison(s).`);
}
</script>
</body>
</html>
