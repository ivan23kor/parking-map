<!DOCTYPE html>
<html>
<head>
    <title>Diagnostic Results</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
        .result { margin: 20px 0; padding: 15px; background: #2d2d2d; border-left: 3px solid #007acc; }
        .label { color: #4ec9b0; font-weight: bold; margin-bottom: 10px; }
        .output { white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>
    <h1>Diagnostic Results</h1>
    <div id="results"></div>
    
    <script>
        // Wait for the main page to be ready
        setTimeout(() => {
            const opener = window.opener;
            if (!opener) {
                document.getElementById('results').innerHTML = '<div class="result"><div class="label">ERROR:</div><div class="output">No opener window found. Please open this from the main app.</div></div>';
                return;
            }
            
            const results = [];
            
            // Command 1: Get calibration data
            try {
                const cmd1 = JSON.stringify(opener.calibrationData.map(d => ({
                    sign_pitch: d.sign_pitch, 
                    horiz_dist: d.horiz_dist, 
                    dh: (d.horiz_dist * Math.tan(-d.sign_pitch * Math.PI / 180)).toFixed(3)
                })));
                results.push({label: 'Command 1: Calibration Data', output: cmd1});
            } catch (e) {
                results.push({label: 'Command 1: Calibration Data', output: 'ERROR: ' + e.message});
            }
            
            // Command 2: Get fitted deltaH
            try {
                const cmd2 = opener.fitDeltaH();
                results.push({label: 'Command 2: Fitted deltaH', output: String(cmd2)});
            } catch (e) {
                results.push({label: 'Command 2: Fitted deltaH', output: 'ERROR: ' + e.message});
            }
            
            // Command 3: Get all detections
            try {
                const cmd3 = JSON.stringify(opener.currentDetections.map((d,i) => ({
                    i, 
                    h: +d.heading.toFixed(1), 
                    p: +d.pitch.toFixed(3), 
                    conf: +d.confidence.toFixed(2), 
                    angW: d.angularWidth?.toFixed(2), 
                    angH: d.angularHeight?.toFixed(2)
                })));
                results.push({label: 'Command 3: All Detections', output: cmd3});
            } catch (e) {
                results.push({label: 'Command 3: All Detections', output: 'ERROR: ' + e.message});
            }
            
            // Command 4: Check screen position
            try {
                const pov = opener.detectionPanorama.getPov();
                const fov = opener.zoomToFov(pov.zoom);
                const best = opener.currentDetections.reduce((a,b) => a.confidence > b.confidence ? a : b);
                const screen = opener.angularToScreen(
                    best, 
                    pov.heading, 
                    pov.pitch, 
                    fov, 
                    opener.document.getElementById('detectionPanorama').clientWidth, 
                    opener.document.getElementById('detectionPanorama').clientHeight
                );
                const container = {
                    width: opener.document.getElementById('detectionPanorama').clientWidth,
                    height: opener.document.getElementById('detectionPanorama').clientHeight
                };
                results.push({
                    label: 'Command 4: Screen Position', 
                    output: 'Screen pos: ' + JSON.stringify(screen) + '\nContainer: ' + container.width + ' x ' + container.height
                });
            } catch (e) {
                results.push({label: 'Command 4: Screen Position', output: 'ERROR: ' + e.message});
            }
            
            // Display results
            const html = results.map(r => 
                `<div class="result"><div class="label">${r.label}:</div><div class="output">${r.output}</div></div>`
            ).join('');
            document.getElementById('results').innerHTML = html;
        }, 1000);
    </script>
</body>
</html>
