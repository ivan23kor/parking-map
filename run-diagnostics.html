<!DOCTYPE html>
<html>
<head>
    <title>Run Diagnostics</title>
    <style>
        body { 
            font-family: 'Courier New', monospace; 
            padding: 20px; 
            background: #1e1e1e; 
            color: #d4d4d4; 
            line-height: 1.6;
        }
        button {
            background: #007acc;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover { background: #005a9e; }
        .result { 
            margin: 20px 0; 
            padding: 15px; 
            background: #2d2d2d; 
            border-left: 3px solid #007acc; 
        }
        .label { 
            color: #4ec9b0; 
            font-weight: bold; 
            margin-bottom: 10px; 
        }
        .output { 
            white-space: pre-wrap; 
            word-break: break-all; 
            color: #ce9178;
        }
        .error { color: #f48771; }
    </style>
</head>
<body>
    <h1>Diagnostic Commands</h1>
    <p>Click the button below to run all diagnostic commands and display results:</p>
    <button onclick="runDiagnostics()">Run All Diagnostics</button>
    <div id="results"></div>
    
    <script>
        function runDiagnostics() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Running diagnostics...</p>';
            
            const results = [];
            
            // Command 1: Get calibration data
            try {
                if (typeof calibrationData === 'undefined') {
                    throw new Error('calibrationData is not defined');
                }
                const cmd1 = JSON.stringify(calibrationData.map(d => ({
                    sign_pitch: d.sign_pitch, 
                    horiz_dist: d.horiz_dist, 
                    dh: (d.horiz_dist * Math.tan(-d.sign_pitch * Math.PI / 180)).toFixed(3)
                })));
                results.push({label: 'Command 1: Calibration Data', output: cmd1, error: false});
            } catch (e) {
                results.push({label: 'Command 1: Calibration Data', output: e.message, error: true});
            }
            
            // Command 2: Get fitted deltaH
            try {
                if (typeof fitDeltaH === 'undefined') {
                    throw new Error('fitDeltaH is not defined');
                }
                const cmd2 = fitDeltaH();
                results.push({label: 'Command 2: Fitted deltaH', output: String(cmd2), error: false});
            } catch (e) {
                results.push({label: 'Command 2: Fitted deltaH', output: e.message, error: true});
            }
            
            // Command 3: Get all detections
            try {
                if (typeof currentDetections === 'undefined') {
                    throw new Error('currentDetections is not defined');
                }
                const cmd3 = JSON.stringify(currentDetections.map((d,i) => ({
                    i, 
                    h: +d.heading.toFixed(1), 
                    p: +d.pitch.toFixed(3), 
                    conf: +d.confidence.toFixed(2), 
                    angW: d.angularWidth?.toFixed(2), 
                    angH: d.angularHeight?.toFixed(2)
                })));
                results.push({label: 'Command 3: All Detections', output: cmd3, error: false});
            } catch (e) {
                results.push({label: 'Command 3: All Detections', output: e.message, error: true});
            }
            
            // Command 4: Check screen position
            try {
                if (typeof detectionPanorama === 'undefined') {
                    throw new Error('detectionPanorama is not defined');
                }
                const pov = detectionPanorama.getPov();
                const fov = zoomToFov(pov.zoom);
                const best = currentDetections.reduce((a,b) => a.confidence > b.confidence ? a : b);
                const screen = angularToScreen(
                    best, 
                    pov.heading, 
                    pov.pitch, 
                    fov, 
                    document.getElementById('detectionPanorama').clientWidth, 
                    document.getElementById('detectionPanorama').clientHeight
                );
                const container = {
                    width: document.getElementById('detectionPanorama').clientWidth,
                    height: document.getElementById('detectionPanorama').clientHeight
                };
                const output = 'Screen pos: ' + JSON.stringify(screen) + '\nContainer: ' + container.width + ' x ' + container.height;
                results.push({label: 'Command 4: Screen Position', output: output, error: false});
            } catch (e) {
                results.push({label: 'Command 4: Screen Position', output: e.message, error: true});
            }
            
            // Display results
            const html = results.map(r => 
                `<div class="result">
                    <div class="label">${r.label}:</div>
                    <div class="output ${r.error ? 'error' : ''}">${r.output}</div>
                </div>`
            ).join('');
            resultsDiv.innerHTML = html;
        }
        
        // Auto-run on load
        window.addEventListener('load', () => {
            setTimeout(runDiagnostics, 500);
        });
    </script>
</body>
</html>
